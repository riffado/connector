name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Zip
        run: pnpm zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openplaud-connector
          path: dist-zip/*.zip

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-zip/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Sideload-only releases until the Chrome Web Store listing is
          # live (icons + promo tile pending). Flip to false once the
          # extension is published on CWS.
          prerelease: true
